name: public-release-check

on:
  push:
  pull_request:

jobs:
  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Public data and syntax checks
        run: python scripts/misc/public_release_check.py
      - name: Core health check
        run: python scripts/misc/lab_healthcheck.py
      - name: Bootstrap core wrappers
        shell: pwsh
        run: ./scripts/misc/bootstrap.ps1 -Force
      - name: Misc toolcheck smoke
        run: python scripts/misc/ai_toolcheck.py --board misc
      - name: KB documentation audit
        run: python scripts/misc/kb_doc_audit.py
      - name: KB frontmatter check
        run: python scripts/misc/add_frontmatter.py --verify
      - name: SEO audit
        run: python scripts/misc/seo_audit.py
      - name: Python unit tests
        run: |
          python -m pip install pytest
          python -m pytest
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem scripts -Recurse -Filter *.ps1 | ForEach-Object {
            $tokens = $null; $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            $errors += $parseErrors
          }
          if ($errors.Count) { $errors | Format-List; exit 1 }
      - name: Offline CVE pipeline smoke
        shell: pwsh
        run: ./scripts/ctf-website/smoke_cve_pipeline.ps1
      - name: ReverseLabToolsMCP dependency and CLI smoke
        shell: pwsh
        run: |
          pip install uv
          uv sync --project tools/skills/mcp/ReverseLabToolsMCP
          uv run --project tools/skills/mcp/ReverseLabToolsMCP python tools/skills/mcp/ReverseLabToolsMCP/reverse_lab_tools_mcp.py --help
