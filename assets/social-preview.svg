<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Terminal decoration -->
  <rect x="60" y="50" width="1160" height="30" rx="6" fill="#21262d"/>
  <circle cx="80" cy="65" r="6" fill="#f85149"/>
  <circle cx="102" cy="65" r="6" fill="#d29922"/>
  <circle cx="124" cy="65" r="6" fill="#3fb950"/>

  <!-- Project name -->
  <text x="640" y="270" text-anchor="middle" font-family="monospace" font-size="80" font-weight="bold" fill="#58a6ff">
    ReverseLab
  </text>

  <!-- Accent line under title -->
  <rect x="390" y="295" width="500" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="640" y="360" text-anchor="middle" font-family="monospace" font-size="26" fill="#8b949e">
    Open-Source Reverse Engineering Lab &amp; MCP Tool Ecosystem
  </text>

  <!-- Stats -->
  <g font-family="monospace" font-size="22" fill="#c9d1d9" text-anchor="middle">
    <text x="320" y="440">197  Knowledge Base Articles</text>
    <text x="640" y="440">100+  MCP Automation Tools</text>
    <text x="960" y="440">5  Analysis Boards</text>
  </g>

  <!-- Boards chips -->
  <g font-family="monospace" font-size="20" text-anchor="middle">
    <rect x="150" y="480" width="170" height="36" rx="18" fill="#1f6feb22" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="235" y="504" fill="#58a6ff">CTF Website</text>

    <rect x="355" y="480" width="170" height="36" rx="18" fill="#23863622" stroke="#238636" stroke-width="1.5"/>
    <text x="440" y="504" fill="#3fb950">APK Reverse</text>

    <rect x="560" y="480" width="170" height="36" rx="18" fill="#9e6a0322" stroke="#9e6a03" stroke-width="1.5"/>
    <text x="645" y="504" fill="#d29922">PE Reverse</text>

    <rect x="765" y="480" width="170" height="36" rx="18" fill="#8250df22" stroke="#8250df" stroke-width="1.5"/>
    <text x="850" y="504" fill="#a371f7">Crypto/Protocol</text>

    <rect x="970" y="480" width="160" height="36" rx="18" fill="#d73a4922" stroke="#d73a49" stroke-width="1.5"/>
    <text x="1050" y="504" fill="#f85149">Game Cheating</text>
  </g>

  <!-- Footer URL -->
  <text x="640" y="590" text-anchor="middle" font-family="monospace" font-size="18" fill="#484f58">
    github.com/LING71671/open-reverselab
  </text>
</svg>
